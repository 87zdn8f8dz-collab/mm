name: cloud-social-crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

concurrency:
  group: cloud-social-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Write accounts config from secret (optional)
        shell: bash
        env:
          ACCOUNTS_YAML_B64: ${{ secrets.ACCOUNTS_YAML_B64 }}
        run: |
          if [[ -n "${ACCOUNTS_YAML_B64}" ]]; then
            echo "$ACCOUNTS_YAML_B64" | base64 --decode > config/accounts.yaml
            echo "Use config/accounts.yaml from secret"
          else
            echo "Use config/accounts.example.yaml"
          fi

      - name: Write cookies from secret (optional)
        shell: bash
        env:
          GALLERY_DL_COOKIES_B64: ${{ secrets.GALLERY_DL_COOKIES_B64 }}
        run: |
          if [[ -n "${GALLERY_DL_COOKIES_B64}" ]]; then
            echo "$GALLERY_DL_COOKIES_B64" | base64 --decode > /tmp/gallery-dl-cookies.txt
            echo "GALLERY_DL_COOKIES_FILE=/tmp/gallery-dl-cookies.txt" >> "$GITHUB_ENV"
            echo "cookies enabled"
          else
            echo "cookies not provided"
          fi

      - name: Auto discover 50 niche accounts (optional)
        shell: bash
        env:
          AUTO_DISCOVER: ${{ secrets.AUTO_DISCOVER }}
          X_DISCOVERY_KEYWORDS: ${{ secrets.X_DISCOVERY_KEYWORDS }}
          IG_DISCOVERY_TAGS: ${{ secrets.IG_DISCOVERY_TAGS }}
        run: |
          AUTO_DISCOVER_VALUE="${AUTO_DISCOVER:-1}"
          if [[ "${AUTO_DISCOVER_VALUE}" == "1" || "${AUTO_DISCOVER_VALUE}" == "true" || "${AUTO_DISCOVER_VALUE}" == "yes" ]]; then
            cmd=(python src/discover_accounts.py
              --output config/accounts.auto.yaml
              --report data/archive/discovery/discovery_report.json
              --target-total 50
              --per-query-limit 20
              --timeout-seconds 40
              --max-items-per-account 8
              --command-timeout-seconds 60
              --max-workers 6
              --sleep-request-seconds 1.5
            )
            if [[ -f /tmp/gallery-dl-cookies.txt ]]; then
              cmd+=(--cookies-file /tmp/gallery-dl-cookies.txt)
            fi
            if [[ -n "${X_DISCOVERY_KEYWORDS}" ]]; then
              cmd+=(--x-keywords "${X_DISCOVERY_KEYWORDS}")
            fi
            if [[ -n "${IG_DISCOVERY_TAGS}" ]]; then
              cmd+=(--ig-tags "${IG_DISCOVERY_TAGS}")
            fi
            "${cmd[@]}"
          else
            echo "AUTO_DISCOVER disabled"
          fi

      - name: Run pipeline
        env:
          AUTO_DISCOVER: ${{ secrets.AUTO_DISCOVER }}
        run: |
          AUTO_DISCOVER_VALUE="${AUTO_DISCOVER:-1}"
          CONFIG_PATH="config/accounts.example.yaml"
          if [[ ("${AUTO_DISCOVER_VALUE}" == "1" || "${AUTO_DISCOVER_VALUE}" == "true" || "${AUTO_DISCOVER_VALUE}" == "yes") && -f "config/accounts.auto.yaml" ]]; then
            CONFIG_PATH="config/accounts.auto.yaml"
          elif [[ -f "config/accounts.yaml" ]]; then
            CONFIG_PATH="config/accounts.yaml"
          fi
          echo "CONFIG_PATH=${CONFIG_PATH}"
          python src/pipeline.py --config "$CONFIG_PATH" --data-root data

      - name: Export hot content ranking
        run: |
          python src/export_hot_content.py --raw-root data/raw --out-dir data/archive/hot_content --top-n 300

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: social-materials-${{ github.run_id }}
          path: |
            data/archive
            data/rejected
            config/accounts.auto.yaml
          if-no-files-found: warn
          retention-days: 30
